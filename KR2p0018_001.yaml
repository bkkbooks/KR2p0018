body:
  text: 夫子曰好美如好緇衣惡惡如惡巷伯則民咸服力而刑不蠢頓詩云儀型文王萬邦作孚子曰有國者章好章惡以示民厚則民情不忒詩云靖共爾位好是正直子曰為上可望而知也為下可類述而等也則君不疑其臣臣不惑於君詩云淑人君子其儀不忒尹誥云惟伊尹及湯咸有一德子曰上人疑則百姓惑下難知則君長勞故君民者章好以示民欲謹惡以御泄民淫則民不惑臣事君言其所不能不辭其所能則君不勞大雅云上帝板板下民卒疸疸小雅云非其止之共非其止共唯王恭邛唯王之邛子曰民以君為心君以民為體心好則體安之君好則民欲之故心以體廢君以民亡詩云誰秉國成不自為貞正卒勞百姓君牙云日暑雨小民惟日怨晉冬耆滄小民亦惟日怨子曰上好仁則下之為仁也爭先故長民者彰章志以昭百姓則民致行己以悅上詩云有覺德行四方順之子曰禹立三年百姓以仁道豈必盡仁詩云成王之孚下土之式呂型云一人有慶萬民賴之子曰下之事上也不從其所以命而從其所行上好此物也下必有甚焉者矣故上之好惡不可不慎也民之表也詩云赫赫師尹民具爾瞻子曰長民者衣服不改從容有常則民德一詩云其容不改出言有章順黎民所望信子曰大人不親其所賢而信其所賤教此以失民此以變煩詩云彼求我則如不我得執我仇仇亦不我力君陳云未見聖如其弗克見我既見我弗迪聖子曰大臣之不親也則忠敬不足而富貴已過也邦家之不寧也則大臣不治而褻臣託也此以大臣不可不敬民之蕝也故君不與小謀大則大臣不怨葉祭公之顧命云毋以小謀敗大圖毋以嬖御塞莊后毋以嬖士塞大夫卿士子曰長民者教之以德齊之以禮則民有勸心教之以政齊之以刑則民有免心故孳以愛之則民有親信以結之則民不倍恭以蒞蒞之則民有遜心詩云子曰政之不行教之不成也則刑罰不足恥而爵不足勸也故上不可以褻刑而輕爵康誥云敬明乃罰呂刑云播刑之迪子曰王言如絲其出如綸糸昏綸王言如索其出如糸聿紼故大人不倡流詩云慎爾出話敬爾威儀子曰可言不可行君子弗言可行不可言君子弗行則民言不危行行不危言詩云淑慎爾止不愆衍于儀子曰君子道人以言而恆以行故言則慮其所終行則稽其所敝則民慎於言而謹於行詩云穆穆文王於緝熙敬止子曰言從行之則行不可匿故君子顧言而行以成其信則民不能大其美而小其惡大雅云白圭之玷尚可磨也此言之玷不可為也小雅云允也君子子曰君子言有物行有格此以生不可奪志死不可奪名故君子多聞齊而守之多志齊而親之精知略而行之詩云淑人君子其儀一也君陳云子曰苟有車必見其蓋苟有衣必見其黻人苟有言必聞其聲苟有行必見其成詩云服之亡懌斁子曰私惠不懷德君子不自留焉詩云人之好我示我周行子曰唯君子能好其匹小人豈能好其匹故君子之友也有鄉向其惡有方此以邇者不惑而遠者不疑詩云君子好逑子曰輕絶貧賤而重絶富貴則好仁不堅而惡不著也人雖曰不利吾弗信之矣詩云朋友攸攝攝以威儀子曰宋人有言曰人而亡恆不可為卜筮也其古之遺言與龜筮猶弗知而況於人乎詩云我龜既厭不我告猷
